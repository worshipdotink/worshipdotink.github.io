<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Prayer Request Lower Third Viewer</title>
    <style>
      :root {
        --lower-third-height: 255px;
        --panel-bg: white;
        --panel-border: rgba(255, 255, 255, 0.12);
        --text-primary: black;
        --text-secondary: black;
        --accent: #FF4331;
      }

      @font-face {
        font-family: "Cowboy Standard";
        src: url("./Cowboy-Standard.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Cowboy Standard", Inter, Avenir, Helvetica, Arial, sans-serif;
        background: transparent;
        color: var(--text-primary);
      }

      .viewer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: var(--lower-third-height);
        display: flex;
        align-items: stretch;
        background: #DEA97C;
        border-top: 1px solid var(--panel-border);
        backdrop-filter: blur(6px);
      }

      .qr-panel {
        width: 220px;
        min-width: 220px;
        padding: 18px 16px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
        text-align: center;
        position: relative;
        z-index: 2;
      }

      .qr-panel img {
        width: 136px;
        height: 136px;
        border-radius: 10px;
        background: #dea97c;
        padding: 6px;
      }

      .qr-caption {
        font-size: 1.5rem;
        color: var(--text-secondary);
        text-transform: uppercase;
      }

      .ticker-wrap {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        position: relative;
        padding: 0 18px 0 0;
      }

      .cards-stage {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 8px;
      }

      .request-card {
        flex: 0 1 auto;
        width: 280px;
        min-width: 220px;
        max-width: 560px;
        min-height: 170px;
        max-height: 190px;
        border: 2px solid #000;
        padding: 16px 18px;
        background: var(--panel-bg);
        display: flex;
        flex-direction: column;
        gap: 10px;
        box-shadow: 8px 8px 0 #000;
        backface-visibility: hidden;
        transform: translateZ(0);
        overflow: hidden;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 500ms ease, transform 500ms ease;
      }

      .request-card.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .request-card.exiting {
        opacity: 0;
        transform: translateY(10px);
      }

      .request-name {
        color: var(--accent);
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: 0.02em;
      }

      .request-text {
        color: var(--text-primary);
        font-size: 1rem;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .request-text.truncated {
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 6;
        line-clamp: 6;
        -webkit-box-orient: vertical;
      }

      .status {
        padding: 0 24px;
        font-size: 1rem;
        color: var(--text-secondary);
      }

    </style>
  </head>
  <body>
    <div class="viewer">
      <aside class="qr-panel">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&color=0-0-0&bgcolor=222-169-124&data=https%3A%2F%2Fworship.ink%2F"
          alt="QR code to worship.ink"
        />
        <div class="qr-caption">SUBMIT A PRAYER REQUEST</div>
      </aside>

      <section class="ticker-wrap">
        <div id="status" class="status">Loading prayer requests...</div>
        <div id="cardsStage" class="cards-stage" style="display: none"></div>
      </section>
    </div>

    <script type="module">
      import { ConvexClient } from "https://esm.sh/convex@1.28.2/browser";

      const convex = new ConvexClient("https://fast-bear-5.convex.cloud");
      const statusEl = document.getElementById("status");
      const cardsStage = document.getElementById("cardsStage");
      const fadeDurationMs = 500;
      const dwellMultiplier = 1.75;

      let requestPlaylist = [];
      let rotationIndex = 0;
      let displayTimerId = null;
      let activeCycleToken = 0;

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function extractFirstName(name) {
        const trimmed = name.trim();
        if (!trimmed) {
          return "Anonymous";
        }
        return trimmed.split(/\s+/)[0] ?? "Anonymous";
      }

      function cardWidthForRequest(request, stageWidth) {
        const estimated = estimateCardWidth(request);
        const maxForViewport = Math.max(240, Math.floor(stageWidth * 0.72));
        return Math.min(estimated, maxForViewport);
      }

      function shouldTruncateMessage(request, stageWidth) {
        const textLength = (request.prayerRequest ?? "").trim().length;
        const cardWidth = cardWidthForRequest(request, stageWidth);
        return textLength > 280 && cardWidth > stageWidth * 0.5;
      }

      function buildCardHtml(request, widthPx, truncateText = false) {
        const submittedName = request.name ?? request.firstName ?? "";
        const textClass = truncateText ? "request-text truncated" : "request-text";
        return `<article class="request-card" style="width:${widthPx}px"><div class="request-name">${escapeHtml(extractFirstName(submittedName))}</div><div class="${textClass}">${escapeHtml(request.prayerRequest)}</div></article>`;
      }

      function estimateCardWidth(request) {
        const textLength = (request.prayerRequest ?? "").trim().length;
        if (textLength <= 60) return 220;
        if (textLength <= 120) return 280;
        if (textLength <= 180) return 340;
        if (textLength <= 260) return 420;
        if (textLength <= 360) return 500;
        return 560;
      }

      function clearDisplayTimer() {
        if (displayTimerId !== null) {
          clearTimeout(displayTimerId);
          displayTimerId = null;
        }
      }

      function readTimeMs(batch) {
        const maxChars = batch.reduce(
          (currentMax, request) => Math.max(currentMax, (request.prayerRequest ?? "").trim().length),
          0,
        );
        const cardCountPenalty = Math.max(0, batch.length - 1) * 600;
        const adaptive = 3600 + maxChars * 70 + cardCountPenalty;
        return Math.min(23000, Math.max(8500, adaptive * dwellMultiplier));
      }

      function nextBatch() {
        if (!requestPlaylist.length) {
          return [];
        }
        const stageWidth = cardsStage.clientWidth || 860;
        const gap = 16;
        const maxCards = Math.min(4, requestPlaylist.length);
        const batch = [];
        let usedWidth = 0;

        for (let offset = 0; offset < maxCards; offset += 1) {
          const request = requestPlaylist[(rotationIndex + offset) % requestPlaylist.length];
          const cardWidth = cardWidthForRequest(request, stageWidth);
          const projected = usedWidth + (batch.length ? gap : 0) + cardWidth;
          if (projected > stageWidth && batch.length > 0) {
            break;
          }
          batch.push(request);
          usedWidth = projected;
        }

        rotationIndex = (rotationIndex + Math.max(1, batch.length)) % requestPlaylist.length;
        return batch;
      }

      function cycleCards() {
        if (!requestPlaylist.length) {
          showEmptyState("No public prayer requests yet.");
          return;
        }
        activeCycleToken += 1;
        const cycleToken = activeCycleToken;
        const batch = nextBatch();
        const stageWidth = cardsStage.clientWidth || 860;
        cardsStage.innerHTML = batch
          .map((request) => {
            const cardWidth = cardWidthForRequest(request, stageWidth);
            return buildCardHtml(
              request,
              cardWidth,
              shouldTruncateMessage(request, stageWidth),
            );
          })
          .join("");
        const cards = Array.from(cardsStage.querySelectorAll(".request-card"));
        statusEl.style.display = "none";
        cardsStage.style.display = "flex";

        requestAnimationFrame(() => {
          if (cycleToken !== activeCycleToken) return;
          cards.forEach((card) => card.classList.add("visible"));
        });

        const visibleForMs = readTimeMs(batch);
        displayTimerId = setTimeout(() => {
          if (cycleToken !== activeCycleToken) return;
          cards.forEach((card) => {
            card.classList.remove("visible");
            card.classList.add("exiting");
          });
          displayTimerId = setTimeout(() => {
            if (cycleToken !== activeCycleToken) return;
            cycleCards();
          }, fadeDurationMs);
        }, visibleForMs);
      }

      function applyPlaylist(requests) {
        const ordered = requests.slice().reverse();
        const previousFirstId = requestPlaylist[0]?._id;
        requestPlaylist = ordered;
        if (!requestPlaylist.length) {
          showEmptyState("No public prayer requests yet.");
          return;
        }

        const currentIndexRequest = requestPlaylist.findIndex((request) => request._id === previousFirstId);
        if (currentIndexRequest >= 0) {
          rotationIndex = currentIndexRequest % requestPlaylist.length;
        } else {
          rotationIndex = rotationIndex % requestPlaylist.length;
        }
        clearDisplayTimer();
        cycleCards();
      }

      function showEmptyState(message) {
        activeCycleToken += 1;
        clearDisplayTimer();
        requestPlaylist = [];
        rotationIndex = 0;
        cardsStage.style.display = "none";
        cardsStage.innerHTML = "";
        statusEl.textContent = message;
        statusEl.style.display = "block";
      }

      window.addEventListener("resize", () => {
        if (!requestPlaylist.length) return;
        clearDisplayTimer();
        cycleCards();
      });

      function initRealtime() {
        try {
          convex.onUpdate(
            "prayerRequests:listPublic",
            {},
            (requests) => {
              if (!requests.length) {
                showEmptyState("No public prayer requests yet.");
                return;
              }

              applyPlaylist(requests);
            },
            (error) => {
              showEmptyState(
                error instanceof Error ? error.message : "Unable to load prayer requests.",
              );
            },
          );
        } catch (error) {
          showEmptyState(error instanceof Error ? error.message : "Unable to load prayer requests.");
        }
      }

      initRealtime();
    </script>
  </body>
</html>
